[/Script/NsBonsai.NsBonsaiSettings]

; ------------------------------------------------------------
; TypeRules — expanded (prefix by asset class)
; Note: Some assets are still "Blueprint" as an asset class,
; so TypeRules can't always distinguish those without extra registry tags
; ------------------------------------------------------------

; Core meshes
+TypeRules=(ClassPath="/Script/Engine.StaticMesh",TypeToken="SM")
+TypeRules=(ClassPath="/Script/Engine.SkeletalMesh",TypeToken="SK")
+TypeRules=(ClassPath="/Script/Engine.Skeleton",TypeToken="SKEL")
+TypeRules=(ClassPath="/Script/Engine.PhysicsAsset",TypeToken="PHYS")

; Materials
+TypeRules=(ClassPath="/Script/Engine.Material",TypeToken="M")
+TypeRules=(ClassPath="/Script/Engine.MaterialInstance",TypeToken="MI")
+TypeRules=(ClassPath="/Script/Engine.MaterialFunction",TypeToken="MF")
+TypeRules=(ClassPath="/Script/Engine.MaterialParameterCollection",TypeToken="MPC")

; Textures (suffixes like _D/_N/_R are user descriptors
+TypeRules=(ClassPath="/Script/Engine.Texture",TypeToken="T")
+TypeRules=(ClassPath="/Script/Engine.Texture2D",TypeToken="T")
+TypeRules=(ClassPath="/Script/Engine.TextureCube",TypeToken="TC")
+TypeRules=(ClassPath="/Script/Engine.TextureRenderTarget2D",TypeToken="RT")
+TypeRules=(ClassPath="/Script/Engine.TextureRenderTargetCube",TypeToken="RTC")

; Particles / VFX
+TypeRules=(ClassPath="/Script/Engine.ParticleSystem",TypeToken="PS")
+TypeRules=(ClassPath="/Script/Niagara.NiagaraSystem",TypeToken="NS")
+TypeRules=(ClassPath="/Script/Niagara.NiagaraEmitter",TypeToken="NE")

; Animation assets
+TypeRules=(ClassPath="/Script/Engine.AnimSequence",TypeToken="AS")
+TypeRules=(ClassPath="/Script/Engine.AnimMontage",TypeToken="AM")
+TypeRules=(ClassPath="/Script/Engine.AnimBlueprint",TypeToken="ABP")
+TypeRules=(ClassPath="/Script/Engine.BlendSpace",TypeToken="BS")
+TypeRules=(ClassPath="/Script/Engine.AimOffsetBlendSpace",TypeToken="AO")

; Sequencer / cinematic
+TypeRules=(ClassPath="/Script/LevelSequence.LevelSequence",TypeToken="LS")

; Data assets
+TypeRules=(ClassPath="/Script/Engine.DataTable",TypeToken="DT")
+TypeRules=(ClassPath="/Script/Engine.CurveFloat",TypeToken="C")
+TypeRules=(ClassPath="/Script/Engine.CurveVector",TypeToken="C")
+TypeRules=(ClassPath="/Script/Engine.CurveLinearColor",TypeToken="C")
+TypeRules=(ClassPath="/Script/Engine.CurveTable",TypeToken="CT")

; UI
+TypeRules=(ClassPath="/Script/Engine.Font",TypeToken="Font")
+TypeRules=(ClassPath="/Script/UMGEditor.WidgetBlueprint",TypeToken="WBP")

; Audio (Tom Looman commonly uses S_ + Att_ + MSS_)
+TypeRules=(ClassPath="/Script/Engine.SoundWave",TypeToken="S")
+TypeRules=(ClassPath="/Script/Engine.SoundCue",TypeToken="SC")
+TypeRules=(ClassPath="/Script/Engine.SoundAttenuation",TypeToken="SA")
+TypeRules=(ClassPath="/Script/MetasoundEngine.MetaSoundSource",TypeToken="MSS")

; AI
+TypeRules=(ClassPath="/Script/AIModule.BehaviorTree",TypeToken="BT")
+TypeRules=(ClassPath="/Script/AIModule.BlackboardData",TypeToken="BB")
+TypeRules=(ClassPath="/Script/AIModule.EnvQuery",TypeToken="EQS")

; Enhanced Input (UE5)
+TypeRules=(ClassPath="/Script/EnhancedInput.InputAction",TypeToken="IA")
+TypeRules=(ClassPath="/Script/EnhancedInput.InputMappingContext",TypeToken="IMC")

; Generic Blueprints
+TypeRules=(ClassPath="/Script/Engine.Blueprint",TypeToken="BP")


